<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For my baby </title>
    <style>
        body { text-align: center; font-family: 'Arial', sans-serif; background-color: #ffe6e6; padding-top: 50px; }
        .container { position: relative; height: 300px; }
        h1 { color: #d63384; }
        button { padding: 15px 25px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; margin: 10px; transition: 0.3s; }
        #yesBtn { background-color: #ff4d6d; color: white; }
        #noBtn { background-color: #6c757d; color: white; position: @keyframes hearts {
  0% { transform: translateY(-10vh) rotate(45deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(45deg); opacity: 0; }
}
.heart {
  position: absolute;
  top: -10%;
  color: #d63384;
  font-size: 20px;
  animation: hearts 5s linear infinite;
}
  </style>
</head>
<body>
    <h1>Will you be my baby, Sukriti? ❤️</h1>
    <div class="<img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1ZzZ0ZzR0ZzR0ZzR0ZzR0ZzR0ZzR0ZzR0ZzR0ZzR0ZzR0JpbiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/MDJ9IbxxvDUQM/giphy.gif" alt="Cute Cat" style="width: 200px;">
container">
        <button id="yesBtn" onclick="alert('Yay! See you on the 14th!')">Yes</button>
        <button id="noBtn" onmouseover="moveButton()">No</button>
    </div>

    <script>
        function moveButton() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }
    </script>
<script>
  const noBtn = document.querySelector('#noBtn');
  noBtn.addEventListener('mouseover', () => {
    const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
    const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
    noBtn.style.left = `${x}px`;
    noBtn.style.top = `${y}px`;
  });
<script>
  function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.innerHTML = '❤️';
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.animationDuration = Math.random() * 2 + 3 + 's';
    document.body.appendChild(heart);
    setTimeout(() => { heart.remove(); }, 5000);
  }
  setInterval(createHeart, 300);
</script>
</script>
</body>
</html>
