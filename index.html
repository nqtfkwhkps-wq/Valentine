<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For my baby</title>
    <style>
        body { text-align: center; font-family: 'Arial', sans-serif; background-color: #ffdde1; overflow: hidden; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .container { position: relative; z-index: 10; }
        h1 { color: #d63384; margin-bottom: 20px; }
        button { padding: 15px 25px; font-size: 18px; cursor: pointer; border: none; border-radius: 10px; margin: 10px; transition: 0.3s; }
        #yesBtn { background-color: #ff4d6d; color: white; }
        #noBtn { background-color: #6c757d; color: white; position: absolute; }
        
        @keyframes hearts {
            0% { transform: translateY(-10vh) rotate(45deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(45deg); opacity: 0; }
        }
        .heart { position: absolute; top: -10%; color: #d63384; animation: hearts 5s linear infinite; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1ZzZ0ZzR0ZzR0ZzR0ZzR0ZzR0ZzR0ZzR0ZzR0ZzR0JpbiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/MDJ9IbxxvDUQM/giphy.gif" style="width: 150px;">
        <h1>Will you be my baby, Sukriti? ❤️</h1>
        <button id="yesBtn" onclick="alert('Yay! I love you! ❤️')">Yes</button>
        <button id="noBtn">No</button>
    </div>

    <script>
        // This makes the hearts fall
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300);

        // This makes the No button move away
        const noBtn = document.querySelector('#noBtn');
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        });
    </script>
</body>
</html>
